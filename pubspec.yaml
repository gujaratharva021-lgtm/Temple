name: Temple
description: One Bharat Spiritual & Temple Platform

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.2.0

  # HTTP & API
  dio: ^5.4.1
  retrofit: ^4.1.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0

  # UI Components
  google_fonts: ^8.1.0
  flutter_svg: ^2.3.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  carousel_slider: ^4.2.1
  flutter_rating_bar: ^4.0.1
  badges: ^3.1.2
  dotted_border: ^2.1.0

  # Maps
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0

  # Media
  image_picker: ^1.0.7
  video_player: ^2.8.3
  chewie: ^1.7.4
  webview_flutter: ^4.4.2

  # Payments
  razorpay_flutter: ^1.3.6


  # Charts & Analytics
  fl_chart: ^0.67.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  url_launcher: ^6.2.5
  share_plus: ^7.2.2
  permission_handler: ^11.3.0
  connectivity_plus: ^6.0.2
  path_provider: ^2.1.2
  flutter_animate: ^4.5.0
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/temple_logo.png"
  adaptive_icon_background: "#FF8C00"
  adaptive_icon_foreground: "assets/images/temple_logo.png"
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
    - assets/fonts/
    - assets/images/zodiac/
    - assets/images/pooja/
  
